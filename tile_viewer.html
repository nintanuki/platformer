<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tile Viewer — Terrain (16×16)</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Silkscreen&display=swap');

  :root {
    --bg: #0d0d0f;
    --panel: #151519;
    --border: #2a2a35;
    --accent: #c8ff57;
    --accent2: #57c8ff;
    --hover: #1e1e28;
    --selected-bg: #1a2200;
    --text: #c5c5d4;
    --dim: #5a5a72;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Share Tech Mono', monospace;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 32px 16px;
  }

  header {
    text-align: center;
    margin-bottom: 32px;
  }

  h1 {
    font-family: 'Silkscreen', monospace;
    font-size: 1.6rem;
    color: var(--accent);
    letter-spacing: 0.05em;
    text-shadow: 0 0 20px rgba(200,255,87,0.35);
    margin-bottom: 6px;
  }

  .subtitle {
    color: var(--dim);
    font-size: 0.8rem;
    letter-spacing: 0.1em;
  }

  .layout {
    display: flex;
    gap: 24px;
    align-items: flex-start;
    width: 100%;
    max-width: 1000px;
    flex-wrap: wrap;
    justify-content: center;
  }

  /* ── Grid panel ── */
  .grid-panel {
    background: var(--panel);
    border: 1px solid var(--border);
    padding: 20px;
    flex: 1 1 auto;
    min-width: 0;
  }

  .panel-label {
    font-size: 0.7rem;
    color: var(--dim);
    letter-spacing: 0.15em;
    text-transform: uppercase;
    margin-bottom: 12px;
  }

  #grid {
    display: grid;
    grid-template-columns: repeat(22, 1fr);
    gap: 2px;
    image-rendering: pixelated;
  }

  .tile-cell {
    position: relative;
    cursor: pointer;
    outline: 2px solid transparent;
    transition: outline-color 0.1s;
    image-rendering: pixelated;
    background: #08080a;
  }

  .tile-cell canvas {
    display: block;
    width: 100%;
    aspect-ratio: 1;
    image-rendering: pixelated;
  }

  .tile-cell .idx-badge {
    position: absolute;
    bottom: 1px;
    right: 1px;
    background: rgba(0,0,0,0.72);
    color: var(--dim);
    font-size: 6px;
    line-height: 1;
    padding: 1px 2px;
    pointer-events: none;
    font-family: 'Share Tech Mono', monospace;
  }

  .tile-cell:hover {
    outline-color: var(--accent2);
    z-index: 1;
  }

  .tile-cell.selected {
    outline-color: var(--accent);
    background: var(--selected-bg);
  }

  /* ── Info panel ── */
  .info-panel {
    background: var(--panel);
    border: 1px solid var(--border);
    padding: 20px;
    width: 220px;
    flex-shrink: 0;
  }

  .preview-wrap {
    display: flex;
    justify-content: center;
    margin-bottom: 16px;
  }

  #preview {
    image-rendering: pixelated;
    width: 96px;
    height: 96px;
    background: #08080a;
    border: 1px solid var(--border);
    display: block;
  }

  .info-row {
    display: flex;
    justify-content: space-between;
    margin-bottom: 8px;
    font-size: 0.78rem;
  }

  .info-key { color: var(--dim); }
  .info-val { color: var(--accent); }

  .divider {
    border: none;
    border-top: 1px solid var(--border);
    margin: 14px 0;
  }

  .code-block {
    background: #08080a;
    border: 1px solid var(--border);
    padding: 10px;
    font-size: 0.72rem;
    color: var(--accent2);
    line-height: 1.6;
    word-break: break-all;
    margin-bottom: 8px;
  }

  .code-block .kw { color: #c586c0; }
  .code-block .num { color: var(--accent); }
  .code-block .fn { color: #dcdcaa; }

  .copy-btn {
    width: 100%;
    background: transparent;
    border: 1px solid var(--accent);
    color: var(--accent);
    font-family: 'Share Tech Mono', monospace;
    font-size: 0.72rem;
    padding: 6px;
    cursor: pointer;
    letter-spacing: 0.1em;
    transition: background 0.15s, color 0.15s;
  }

  .copy-btn:hover {
    background: var(--accent);
    color: #000;
  }

  .copy-btn.copied {
    border-color: var(--accent2);
    color: var(--accent2);
  }

  .hint {
    font-size: 0.68rem;
    color: var(--dim);
    text-align: center;
    margin-top: 20px;
    line-height: 1.7;
  }
</style>
</head>
<body>

<header>
  <h1>// TILE VIEWER</h1>
  <p class="subtitle">Terrain (16×16) &nbsp;·&nbsp; 22 cols × 11 rows &nbsp;·&nbsp; 242 tiles</p>
</header>

<div class="layout">

  <div class="grid-panel">
    <p class="panel-label">↓ Click any tile</p>
    <div id="grid"></div>
  </div>

  <div class="info-panel">
    <p class="panel-label">Selected tile</p>
    <div class="preview-wrap">
      <canvas id="preview" width="16" height="16"></canvas>
    </div>

    <div class="info-row">
      <span class="info-key">index</span>
      <span class="info-val" id="sel-index">—</span>
    </div>
    <div class="info-row">
      <span class="info-key">row</span>
      <span class="info-val" id="sel-row">—</span>
    </div>
    <div class="info-row">
      <span class="info-key">col</span>
      <span class="info-val" id="sel-col">—</span>
    </div>
    <div class="info-row">
      <span class="info-key">px offset</span>
      <span class="info-val" id="sel-offset">—</span>
    </div>

    <hr class="divider">

    <p class="panel-label">Python snippet</p>
    <div class="code-block" id="snippet">
      <span style="color:var(--dim)">← pick a tile</span>
    </div>
    <button class="copy-btn" id="copy-btn">[ COPY ]</button>

    <p class="hint">Tiles are indexed left→right,<br>top→bottom (0-based).</p>
  </div>

</div>

const img = new Image();
img.src = "data:image/png;base64," + b64;

img.onload = () => {
  const grid = document.getElementById('grid');
  let selected = null;

  for (let r = 0; r < ROWS; r++) {
    for (let c = 0; c < COLS; c++) {
      const idx = r * COLS + c;
      const cell = document.createElement('div');
      cell.className = 'tile-cell';
      cell.dataset.idx = idx;
      cell.dataset.r = r;
      cell.dataset.c = c;

      const cv = document.createElement('canvas');
      cv.width = TILE; cv.height = TILE;
      const ctx = cv.getContext('2d');
      ctx.imageSmoothingEnabled = false;
      ctx.drawImage(img, c*TILE, r*TILE, TILE, TILE, 0, 0, TILE, TILE);
      cell.appendChild(cv);

      const badge = document.createElement('span');
      badge.className = 'idx-badge';
      badge.textContent = idx;
      cell.appendChild(badge);

      cell.addEventListener('click', () => {
        if (selected) selected.classList.remove('selected');
        cell.classList.add('selected');
        selected = cell;
        showInfo(idx, r, c);
      });

      grid.appendChild(cell);
    }
  }
};

function showInfo(idx, r, c) {
  const px = c * 16, py = r * 16;
  document.getElementById('sel-index').textContent = idx;
  document.getElementById('sel-row').textContent = r;
  document.getElementById('sel-col').textContent = c;
  document.getElementById('sel-offset').textContent = `(${px}, ${py})`;

  // Draw preview
  const pv = document.getElementById('preview');
  const ctx = pv.getContext('2d');
  ctx.imageSmoothingEnabled = false;
  ctx.clearRect(0,0,16,16);
  ctx.drawImage(img, px, py, 16, 16, 0, 0, 16, 16);

  // Snippet
  document.getElementById('snippet').innerHTML =
    `<span class="kw">tiles</span>[<span class="num">${idx}</span>]<br><br>` +
    `<span class="kw">sheet</span>.subsurface(<br>` +
    `&nbsp;&nbsp;(<span class="num">${px}</span>, <span class="num">${py}</span>,<br>` +
    `&nbsp;&nbsp;&nbsp;<span class="num">16</span>, <span class="num">16</span>)<br>` +
    `)`;

  document.getElementById('copy-btn').textContent = '[ COPY ]';
  document.getElementById('copy-btn').className = 'copy-btn';
}

document.getElementById('copy-btn').addEventListener('click', () => {
  const idx = document.getElementById('sel-index').textContent;
  if (idx === '—') return;
  navigator.clipboard.writeText(`tiles[${idx}]`).then(() => {
    const btn = document.getElementById('copy-btn');
    btn.textContent = '[ COPIED ✓ ]';
    btn.className = 'copy-btn copied';
  });
});
</script>
</body>
</html>
